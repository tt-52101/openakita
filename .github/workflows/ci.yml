name: CI

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check version consistency
        run: python scripts/version.py check
      
      - name: Lint with ruff
        run: ruff check src/
      
      - name: Type check with mypy
        run: mypy src/

  # ── L1 单元测试 (每次 Push/PR, <30s) ──
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run L1 unit tests
        run: pytest tests/unit/ -x -v

  # ── L2 组件测试 (每次 Push/PR, <2min) ──
  component_tests:
    runs-on: ubuntu-latest
    needs: [unit_tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run L2 component tests
        run: pytest tests/component/ -x -v

  # ── L3 集成测试 (每次 Push/PR, <3min) ──
  integration_tests:
    runs-on: ubuntu-latest
    needs: [component_tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run L3 integration tests
        run: pytest tests/integration/ -v

  # ── L4 E2E 测试 (仅 main / 手动触发 / 每日, 回放模式) ──
  e2e_tests:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [integration_tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run L4 E2E tests (replay mode)
        env:
          LLM_TEST_MODE: replay
        run: pytest tests/e2e/ -v

  # ── L5 质量评估测试 (仅 main / 手动触发) ──
  quality_tests:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [e2e_tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run L5 quality tests
        run: pytest tests/quality/ -v

  # ── 全量兼容性测试 (跨平台 + legacy) ──
  python_test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run all tests
        if: ${{ hashFiles('tests/**') != '' }}
        run: pytest tests/ -v --cov=src/openakita --cov-report=xml -k "not TestVectorStore"

      - name: Skip tests (no tests directory)
        if: ${{ hashFiles('tests/**') == '' }}
        run: echo "No tests/ directory in repository; skipping pytest."

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: ${{ hashFiles('coverage.xml') != '' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' }}
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  tool_parallel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify parallel tool execution
        if: ${{ hashFiles('tests/llm/unit/test_tool_parallel_execution.py') != '' }}
        run: pytest tests/llm/unit/test_tool_parallel_execution.py -v

      - name: Skip tool_parallel (test file missing)
        if: ${{ hashFiles('tests/llm/unit/test_tool_parallel_execution.py') == '' }}
        run: echo "tests/llm/unit/test_tool_parallel_execution.py not found; skipping."

  setup_center_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        if: ${{ hashFiles('apps/setup-center/package-lock.json') != '' }}
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/setup-center/package-lock.json

      - name: Install dependencies
        if: ${{ hashFiles('apps/setup-center/package-lock.json') != '' }}
        working-directory: apps/setup-center
        run: npm ci

      - name: Build
        if: ${{ hashFiles('apps/setup-center/package-lock.json') != '' }}
        working-directory: apps/setup-center
        run: npm run build

      - name: Skip setup-center build (project not present)
        if: ${{ hashFiles('apps/setup-center/package-lock.json') == '' }}
        run: echo "apps/setup-center not present in repository; skipping."

  setup_center_rust_check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && hashFiles('apps/setup-center/src-tauri/Cargo.toml') != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Set up Rust
        if: ${{ hashFiles('apps/setup-center/src-tauri/Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: ${{ hashFiles('apps/setup-center/src-tauri/Cargo.toml') != '' }}
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/setup-center/src-tauri

      - name: Create resource placeholder for cargo check
        if: ${{ hashFiles('apps/setup-center/src-tauri/Cargo.toml') != '' }}
        shell: bash
        run: |
          mkdir -p apps/setup-center/src-tauri/resources/openakita-server
          # user_custom.md is gitignored (personal data); create placeholder for include_str!()
          mkdir -p identity/personas
          if [ ! -f identity/personas/user_custom.md ]; then
            echo "# User Custom Persona (placeholder)" > identity/personas/user_custom.md
          fi

      - name: Cargo check
        if: ${{ hashFiles('apps/setup-center/src-tauri/Cargo.toml') != '' }}
        working-directory: apps/setup-center/src-tauri
        run: cargo check

      - name: Skip Rust check (project not present)
        if: ${{ hashFiles('apps/setup-center/src-tauri/Cargo.toml') == '' }}
        run: echo "apps/setup-center/src-tauri not present in repository; skipping."

  # ── Tauri 完整构建检查（仅 Linux） ──
  tauri_full_build_check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/setup-center/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/setup-center/src-tauri

      - name: Install Python project and PyInstaller
        run: |
          pip install -e ".[all]"
          pip install "pyinstaller>=6.18.0"

      - name: Clean previous PyInstaller output
        run: |
          rm -rf dist/
          rm -rf build/openakita-server
          rm -rf build/pyinstaller_work

      - name: Package Python backend (PyInstaller)
        run: python build/build_backend.py

      - name: Copy backend to Tauri resources
        run: |
          RESOURCE_DIR="apps/setup-center/src-tauri/resources"
          mkdir -p "$RESOURCE_DIR"
          rm -rf "$RESOURCE_DIR/openakita-server"
          cp -r dist/openakita-server "$RESOURCE_DIR/openakita-server"

      - name: Verify bundled Python contract
        run: python build/verify_bundled_python_contract.py --backend-dir apps/setup-center/src-tauri/resources/openakita-server

      - name: Create gitignored placeholders
        run: |
          mkdir -p identity/personas
          if [ ! -f identity/personas/user_custom.md ]; then
            echo "# User Custom Persona (placeholder)" > identity/personas/user_custom.md
          fi

      - name: Install frontend dependencies
        working-directory: apps/setup-center
        run: npm ci

      - name: Build Tauri bundles (full build)
        working-directory: apps/setup-center
        env:
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npx tauri build --bundles "deb,appimage"

      - name: Verify bundle exists
        run: |
          echo "== bundle tree =="
          find apps/setup-center/src-tauri/target/release/bundle -maxdepth 4 -type f -print || true
          ls -la apps/setup-center/src-tauri/target/release/bundle/deb/*.deb
          echo "Full Tauri build succeeded"

  build:
    runs-on: ubuntu-latest
    needs: [python_lint, python_test, unit_tests, component_tests, integration_tests, tool_parallel, setup_center_build, setup_center_rust_check]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Build package
        run: python -m build
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
